; Asterisk Module Configuration - minimal but functional
[modules]
autoload=yes

; Required for ARI ExternalMedia with WebSocket transport.
; NOTE: Do NOT preload res_websocket_client.so — it depends on sorcery
; wizards that are not yet available at preload time, causing
; "Wizard 'config' could not be applied to object type 'websocket_client'".
; autoload handles the correct dependency order.

noload => res_config_ldap.so
noload => res_config_odbc.so
noload => res_config_pgsql.so
noload => cel_pgsql.so
noload => cdr_pgsql.so