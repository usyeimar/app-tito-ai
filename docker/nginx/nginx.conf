server {
    listen 80;
    server_name app.tito.ai;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name app.tito.ai;

    ssl_certificate     /etc/nginx/certs/app.tito.ai.pem;
    ssl_certificate_key /etc/nginx/certs/app.tito.ai-key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50m;

    # Handle large headers from Laravel (Passport tokens in cookies)
    proxy_buffer_size 256k;
    proxy_buffers 4 256k;
    large_client_header_buffers 4 16k;
    proxy_busy_buffers_size 256k;

    # Reverb (Pusher-compatible) WebSocket + HTTP endpoints.
    location ~ ^/(app|apps)/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy S3-compatible multipart upload requests for local RustFS bucket.
    location ^~ /tito-local/ {
        client_max_body_size 100m;
        proxy_request_buffering off;
        proxy_pass http://rustfs:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://app.tito.ai:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
